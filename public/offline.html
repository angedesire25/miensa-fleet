<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#10b981">
<title>Hors ligne — MiensaFleet</title>
<link rel="manifest" href="/manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .icon {
    width: 80px; height: 80px;
    background: #10b981;
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
    font-size: 40px;
  }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; text-align: center; }
  p  { font-size: 14px; color: #94a3b8; text-align: center; line-height: 1.6; margin-bottom: 32px; max-width: 320px; }
  .btn {
    background: #10b981; color: #fff;
    border: none; border-radius: 10px;
    padding: 13px 28px; font-size: 15px; font-weight: 600;
    cursor: pointer; width: 100%; max-width: 280px;
    margin-bottom: 12px;
  }
  .btn-outline {
    background: transparent; color: #94a3b8;
    border: 1px solid #334155; border-radius: 10px;
    padding: 12px 28px; font-size: 14px;
    cursor: pointer; width: 100%; max-width: 280px;
  }
  .tips {
    margin-top: 40px; padding: 16px;
    background: #1e293b; border-radius: 12px;
    max-width: 320px; width: 100%;
  }
  .tips h3 { font-size: 13px; color: #10b981; margin-bottom: 10px; }
  .tips li  { font-size: 12px; color: #64748b; margin-left: 16px; margin-bottom: 4px; }
</style>
</head>
<body>
  <div class="icon">🚗</div>
  <h1>Vous êtes hors ligne</h1>
  <p>La connexion au serveur MiensaFleet est indisponible. Les données en cache restent accessibles.</p>

  <button class="btn" onclick="window.location.reload()">
    ↺ Réessayer
  </button>
  <button class="btn-outline" onclick="history.back()">
    ← Retour
  </button>

  <div class="tips">
    <h3>Disponible hors ligne :</h3>
    <ul>
      <li>Tableau de bord (dernière version)</li>
      <li>Fiches de contrôle en attente</li>
      <li>Liste des affectations</li>
    </ul>
  </div>

  <script>
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
